<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>周易起卦</title>
  <meta name="theme-color" content="#292524">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header id="header">
      <h1>周易起卦</h1>
    </header>

    <main id="main">
      <!-- ── Idle Phase ── -->
      <section id="phase-idle" class="phase active">
        <div class="hero">
          <div id="domain-display" class="domain-display">
            <div class="domain-number">164839</div>
            <div id="domain-hexagram" class="domain-hexagram"></div>
            <div id="domain-name" class="domain-name"></div>
          </div>
          <p class="hero-text">以三枚硬币<br>起六爻之卦</p>
          <button id="btn-start" class="btn-primary">起卦</button>
        </div>
      </section>

      <!-- ── Casting Phase ── -->
      <section id="phase-casting" class="phase">
        <div class="throw-header">
          <span id="throw-count">第 1 / 6 次</span>
        </div>

        <div id="coin-result" class="coin-result">
          <div class="coins-row">
            <div class="coin" data-index="0"><span class="coin-face">—</span></div>
            <div class="coin" data-index="1"><span class="coin-face">—</span></div>
            <div class="coin" data-index="2"><span class="coin-face">—</span></div>
          </div>
          <div class="coin-sum">
            <span id="coin-num" class="coin-num">—</span>
          </div>
        </div>

        <div id="hexagram-build" class="hexagram-display">
          <div class="hexagram-line placeholder" data-index="0"></div>
          <div class="hexagram-line placeholder" data-index="1"></div>
          <div class="hexagram-line placeholder" data-index="2"></div>
          <div class="hexagram-line placeholder" data-index="3"></div>
          <div class="hexagram-line placeholder" data-index="4"></div>
          <div class="hexagram-line placeholder" data-index="5"></div>
        </div>

        <button id="btn-throw" class="btn-primary">摇卦</button>
        <p id="throw-hint" class="hint-text">点击摇卦，掷三枚硬币</p>
      </section>

      <!-- ── Result Phase ── -->
      <section id="phase-result" class="phase">
        <div id="result-content"></div>
        <button id="btn-reset" class="btn-secondary">重新起卦</button>
      </section>
    </main>
  </div>

  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js');
      });
    }
  </script>
</body>
</html>
